services:
  postgres:
    build: .
    container_name: yverdon-inventory
    environment:
      POSTGRES_USER: infradon
      POSTGRES_PASSWORD: infradon
      POSTGRES_DB: yverdon-inventory
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
      - ./data:/data
      - ./scripts:/scripts

volumes:
  pgdata:
